name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore IngestionApi.sln

      - name: Build
        run: dotnet build Ingestion.Api.Tests/Ingestion.Api.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test Ingestion.Api.Tests/Ingestion.Api.Tests.csproj --configuration Release --no-build
